# Conformance + bench harness for the gen-rs artifact (dev-only tooling;
# the generated module itself has zero dependencies).
[package]
name = "shuttle-rs-harness"
version = "0.0.0"
edition = "2021"
rust-version = "1.87"
publish = false

[workspace]

[dependencies]
# Reference parser for the sq-tonhr.1 go/no-go bench (dev tooling only;
# the generated artifact itself has zero dependencies).
oxttl = { version = "=0.2.3", features = ["rdf-12"] }

[profile.release]
lto = true
codegen-units = 1
